name: Deploy Frontend develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-frontend-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: github.repository == 'Richixs/kinetiq-frontend'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image_meta
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/kinetiq" >> "$GITHUB_OUTPUT"

      - name: Build and push DEV image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_meta.outputs.image_name }}:dev-${{ github.sha }}
            ${{ steps.image_meta.outputs.image_name }}:dev-latest

      - name: Notify ArgoCD (DEV)
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: richixs/gitops
          event-type: update-kinetiq-frontend-dev
          client-payload: |
            {
              "app": "kinetiq",
              "environment": "dev",
              "image": "${{ steps.image_meta.outputs.image_name }}:dev-${{ github.sha }}",
              "sha": "${{ github.sha }}",
              "source_repo": "${{ github.repository }}"
            }
